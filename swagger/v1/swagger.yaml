  "/api/v1/users/{username}/heartbeats/spans":
    get:
      summary: Get user heartbeat spans
      tags:
      - Stats
      description: Returns heartbeat spans for a user, useful for visualizations.
        Accessible anonymously when the target user has public stats lookup enabled;
        otherwise the requester must be the user (authenticated via the User API Key).
      parameters:
      - name: username
        in: path
        description: Username, Slack ID, or User ID. The literal value "my" resolves
          the user from the Authorization Bearer token.
        required: true
        schema:
          type: string
      - name: start_date
        in: query
        schema:
          type: string
          format: date_time
        description: Start date/time (ISO 8601), defaults to 10 years ago
      - name: end_date
        in: query
        schema:
          type: string
          format: date_time
        description: End date/time (ISO 8601), defaults to end of today
      - name: project
        in: query
        description: Filter by single project
        schema:
          type: string
      - name: filter_by_project
        in: query
        description: Filter by multiple projects (comma separated). Ignored if project
          is present.
        schema:
          type: string
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  spans:
                    type: array
                    items:
                      type: object
                      properties:
                        start_time:
                          type: number
                          description: Span start time (epoch seconds)
                          example: 1717689600.0
                        end_time:
                          type: number
                          description: Span end time (epoch seconds)
                          example: 1717691820.5
                        duration:
                          type: number
                          description: Span duration (seconds)
                          example: 2220.5
        '403':
          description: forbidden — The target user has disabled public stats lookup
            and the requester is not that user.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '404':
          description: user not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: invalid date
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
