  "/api/v1/users/{username}/stats":
    get:
      summary: Get user stats
      tags:
      - Stats
      description: |-
        Returns detailed coding stats for a specific user, including languages, projects, and total time.

        Authentication is OPTIONAL: the endpoint is publicly accessible (no token) whenever the target user has public stats lookup enabled. When a User API Key is supplied it is used to resolve the special username "my" and to grant access to the caller's own private stats.

        When total_seconds=true, the response shape is instead { "total_seconds": <number> }.
      security:
      - {}
      - Bearer: []
      - ApiKeyAuth: []
      parameters:
      - name: username
        in: path
        description: Username, Slack ID, or User ID. The literal value "my" resolves
          the current user from the Authorization Bearer token (User API Key).
        required: true
        schema:
          type: string
      - name: start_date
        in: query
        schema:
          type: string
          format: date_time
        description: Start date/time (ISO 8601), defaults to 10 years ago
      - name: end_date
        in: query
        schema:
          type: string
          format: date_time
        description: End date/time (ISO 8601), defaults to end of today
      - name: limit
        in: query
        description: Limit number of results
        schema:
          type: integer
      - name: features
        in: query
        description: Comma-separated list of features to include (e.g., languages,projects).
          Defaults to languages.
        schema:
          type: string
      - name: filter_by_project
        in: query
        description: Filter results by specific project names (comma-separated)
        schema:
          type: string
      - name: filter_by_category
        in: query
        description: Filter results by category (comma-separated)
        schema:
          type: string
      - name: boundary_aware
        in: query
        description: Use boundary aware calculation (only applied in the total_seconds
          branch)
        schema:
          type: boolean
      - name: total_seconds
        in: query
        description: 'When "true", returns only { total_seconds: <number> } instead
          of the full stats object'
        schema:
          type: boolean
      - name: no_ai_coding
        in: query
        description: 'When "true", excludes the "ai coding" category from totals/summary.
          Caveat: heartbeats with no category at all (legacy data) are also excluded
          due to SQL NULL-comparison semantics.'
        schema:
          type: boolean
      - name: test_param
        in: query
        description: 'When "true", switches to test mode: forces boundary-aware +
          valid-timestamps-only and excludes the browsing/meeting/communicating categories
          (plus "ai coding" when no_ai_coding=true)'
        schema:
          type: boolean
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    allOf:
                    - "$ref": "#/components/schemas/StatsSummary"
                    - type: object
                      properties:
                        unique_total_seconds:
                          type: number
                          description: Only present when features includes "projects"
                            AND filter_by_project is supplied.
                          example: 12960.0
                  trust_factor:
                    type: object
                    properties:
                      trust_level:
                        type: string
                        enum:
                        - blue
                        - red
                        - green
                        example: blue
                      trust_value:
                        type: integer
                        enum:
                        - 0
                        - 1
                        - 2
                        example: 0
        '403':
          description: forbidden — User has disabled public stats lookup
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '404':
          description: user not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: invalid date
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/v1/users/lookup_email/{email}":
    get:
      summary: Lookup user by email
      tags:
      - Users
      description: Find a user ID by their email address. Useful for integrations
        that need to map emails to Hackatime users. Requires STATS_API_KEY supplied
        via the Authorization Bearer header (the api_key query param is NOT accepted
        for this endpoint).
      security:
      - Bearer: []
      parameters:
      - name: email
        in: path
        description: Email address to lookup
        required: true
        schema:
          type: string
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: integer
                    example: 42
                  email:
                    type: string
                    example: orpheus@hackclub.com
        '404':
          description: not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: User not found
                  email:
                    type: string
                    example: unknown@example.com
  "/api/v1/users/lookup_slack_uid/{slack_uid}":
    get:
      summary: Lookup user by Slack UID
      tags:
      - Users
      description: Find a user ID by their Slack User ID. Requires STATS_API_KEY supplied
        via the Authorization Bearer header (the api_key query param is NOT accepted
        for this endpoint).
      security:
      - Bearer: []
      parameters:
      - name: slack_uid
        in: path
        description: Slack User ID (e.g. U123456)
        required: true
        schema:
          type: string
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: integer
                    example: 42
                  slack_uid:
                    type: string
                    example: U0266FRGP
        '404':
          description: not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: User not found
                  slack_uid:
                    type: string
                    example: U000000
components:
  securitySchemes:
    Bearer:
      type: http
      scheme: bearer
      description: User API Key from settings, prefixed with "Bearer"
    ApiKeyAuth:
      type: apiKey
      name: api_key
      in: query
      description: User API Key from settings
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          example: Unauthorized
      required:
      - error
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: orpheus
        avatar_url:
          type: string
          example: https://hackatime.hackclub.com/images/athena.png
        display_name:
          type: string
          example: Orpheus
        is_admin:
          type: boolean
          example: false
    Heartbeat:
      type: object
      description: A single unit of coding activity representing a specific moment
        in time.
      properties:
        id:
