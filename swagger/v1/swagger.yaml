        required. The leaderboard is cached and regenerated periodically.
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  period:
                    type: string
                    example: daily
                  start_date:
                    type: string
                    format: date
                    example: '2024-03-20'
                  date_range:
                    type: string
                    example: Wed, Mar 20, 2024
                  generated_at:
                    type: string
                    format: date_time
                    example: '2024-03-20T10:00:00Z'
                  entries:
                    type: array
                    items:
                      "$ref": "#/components/schemas/LeaderboardEntry"
        '503':
          description: service unavailable — Leaderboard is being generated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/v1/leaderboard/weekly":
    get:
      summary: Get weekly leaderboard
      tags:
      - Leaderboard
      description: Returns the weekly leaderboard of coding time (last 7 days). Public,
        no authentication required.
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  period:
                    type: string
                    example: last_7_days
                  start_date:
                    type: string
                    format: date
                    example: '2024-03-13'
