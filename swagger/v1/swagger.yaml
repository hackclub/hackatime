  "/api/v1/my/heartbeats/most_recent":
    get:
      summary: Get most recent heartbeat
      tags:
      - My Data
      description: Returns the most recent heartbeat for the authenticated user. Useful
        for checking if the user is currently active. Authenticate with your API key
        as a Bearer token in the `Authorization` header (HTTP Basic auth with the
        API key is also accepted).
      security:
      - Bearer: []
      parameters:
      - name: source_type
        in: query
        description: Filter by source type (e.g. "direct_entry"). If omitted, results
          exclude heartbeats with source_type "test_entry" by default.
        schema:
          type: string
      - name: editor
        in: query
        description: Filter by editor name (e.g. "VSCode"). Matched case-insensitively.
        schema:
          type: string
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  has_heartbeat:
                    type: boolean
                    description: Whether a matching heartbeat was found.
                    example: true
                  heartbeat:
                    type: object
                    nullable: true
                    description: The most recent matching heartbeat, or null when
                      none is found.
                  editor:
                    type: string
                    nullable: true
                    description: Editor of the matching heartbeat, or null.
                    example: VS Code
                  time_ago:
                    type: string
                    nullable: true
                    description: Human-readable time since the heartbeat (e.g. "5
                      minutes ago"), or null.
                    example: 5 minutes ago
                required:
                - has_heartbeat
                - heartbeat
                - editor
                - time_ago
        '401':
          description: unauthorized — Returned when the Authorization header is missing
            or the token does not match a known API key.
  "/api/v1/my/heartbeats":
    get:
      summary: Get heartbeats
      tags:
      - My Data
      description: Returns a list of heartbeats for the authenticated user within
        a time range. This is the raw data stream. Authenticate with your API key
        as a Bearer token in the `Authorization` header (HTTP Basic auth with the
        API key is also accepted).
      security:
      - Bearer: []
      parameters:
      - name: start_time
        in: query
        schema:
          type: string
          format: date_time
        description: Start time (ISO 8601). Defaults to the beginning of the current
          day when omitted.
      - name: end_time
        in: query
        schema:
          type: string
          format: date_time
        description: End time (ISO 8601). Defaults to the end of the current day when
          omitted.
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  start_time:
                    type: string
                    format: date_time
                    description: Effective start of the queried range.
                    example: '2024-03-20T00:00:00Z'
                  end_time:
                    type: string
                    format: date_time
                    description: Effective end of the queried range.
                    example: '2024-03-20T23:59:59Z'
                  total_seconds:
                    type: number
                    description: Total coding duration in seconds across the returned
                      heartbeats.
                    example: 3600.0
                  heartbeats:
                    type: array
                    description: Heartbeats in the range, ordered by time ascending.
                    items:
                      "$ref": "#/components/schemas/Heartbeat"
                required:
                - start_time
                - end_time
                - total_seconds
                - heartbeats
        '401':
          description: unauthorized — Returned when the Authorization header is missing
            or the token does not match a known API key.
  "/api/v1/stats":
    get:
      summary: Get total coding time
      tags:
      - Stats
      description: Returns the total coding time for all users, optionally filtered
        by user or date range. Authenticated with the shared STATS_API_KEY token (Bearer
        header or api_key query param) — not tied to any user or admin level. Authentication
        is skipped entirely in development.
      security:
      - Bearer: []
        ApiKeyAuth: []
      parameters:
      - name: start_date
        in: query
        schema:
          type: string
          format: date
        description: Start date (YYYY-MM-DD), defaults to 10 years ago
      - name: end_date
        in: query
        schema:
          type: string
          format: date
        description: End date (YYYY-MM-DD), defaults to today
      - name: username
        in: query
        description: Filter by username (optional)
        schema:
          type: string
      - name: user_email
        in: query
        description: Filter by user email (optional)
        schema:
          type: string
      responses:
        '200':
          description: successful
          content:
            text/plain:
              schema:
                type: integer
                example: 123456
        '404':
          description: user not found
          content:
            text/plain:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: invalid date
          content:
            text/plain:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/v1/banned_users/counts":
