                    type: integer
                    example: 152
                  total_duration:
                    type: number
                    example: 7200.0
                  heartbeats:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 987654
                        time:
                          type: string
                          example: '1710946200.0'
                        created_at:
                          type: string
                          format: date_time
                          example: '2024-03-20T15:30:00Z'
                        project:
                          type: string
                          nullable: true
                          example: hackatime
                        branch:
                          type: string
                          nullable: true
                          example: main
                        category:
                          type: string
                          nullable: true
                          example: coding
                        dependencies:
                          type: string
                          nullable: true
                          example: rails,sidekiq
                        editor:
                          type: string
                          nullable: true
                          example: VS Code
                        entity:
                          type: string
                          nullable: true
                          example: app/models/user.rb
                        language:
                          type: string
                          nullable: true
                          example: Ruby
                        machine:
                          type: string
                          nullable: true
                          example: Orpheus-MacBook-Pro
                        operating_system:
                          type: string
                          nullable: true
                          example: Mac
                        type:
                          type: string
                          nullable: true
                          example: file
                        user_agent:
                          type: string
                          nullable: true
                          example: wakatime/v1.115.2 (darwin-24.6.0) go1.23 vscode/1.96.0
                        line_additions:
                          type: integer
                          nullable: true
                          example: 8
                        line_deletions:
                          type: integer
                          nullable: true
                          example: 3
                        lineno:
                          type: integer
                          nullable: true
                          example: 42
                        lines:
                          type: integer
                          nullable: true
                          example: 350
                        cursorpos:
                          type: integer
                          nullable: true
