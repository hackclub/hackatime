  "/api/admin/v1/user/convict":
    post:
      summary: Convict user
      tags:
      - Admin Utils
      description: Mark a user as convicted/banned by setting their trust level. Requires
        admin write permissions and authority to change the target user trust level.
      security:
      - AdminToken: []
      parameters: []
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: User convicted successfully
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 42
                      username:
                        type: string
                        example: orpheus
                      trust_level:
                        type: string
                        example: red
                      updated_at:
                        type: string
                        format: date_time
                        example: '2024-03-20T15:30:00Z'
                  audit_log:
                    type: object
                    properties:
                      changed_by:
                        type: string
                        example: orpheus
                      reason:
                        type: string
                        example: self-reported heartbeats
                      notes:
                        type: string
                        nullable: true
                        example: Reviewed flagged activity
                      timestamp:
                        type: string
                        format: date_time
                        example: '2024-03-20T15:30:00Z'
        '404':
          description: user not found
        '422':
          description: invalid request — Returned when reason is blank, when trust_level
            is not a valid trust level, or when the change fails to apply.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '403':
          description: forbidden — Returned when the authenticated admin lacks write
            access (e.g. a viewer-level key) or is not permitted to change the target
            user's trust level.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - user_id
              - reason
              - trust_level
              properties:
                user_id:
                  type: integer
                  example: 42
                  description: Target user ID. id is also accepted as an alias.
                reason:
                  type: string
                  example: self-reported heartbeats
                  description: Required justification; a blank reason returns 422.
                trust_level:
                  type: string
                  enum:
                  - blue
                  - red
                  - green
                  - yellow
                  example: red
                  description: Required. New trust level; must be a valid trust level
                    key or a 422 is returned.
                notes:
                  type: string
                  example: Reviewed flagged activity
                  description: Optional notes stored on the audit log.
