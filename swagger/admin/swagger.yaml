                  id:
                    type: integer
                    example: 7
                  user_id:
                    type: integer
                    example: 42
                  user:
                    type: object
                    nullable: true
                    properties:
                      id:
                        type: integer
                        example: 42
                      username:
                        type: string
                        example: orpheus
                      display_name:
                        type: string
                        nullable: true
                        example: orpheus
                  status:
                    type: string
                    enum:
                    - pending
                    - approved
                    - cancelled
                    - completed
                    example: pending
                  requested_at:
                    type: string
                    format: date_time
                    nullable: true
                    example: '2024-03-20T15:30:00Z'
                  scheduled_deletion_at:
                    type: string
                    format: date_time
                    nullable: true
                    example: '2024-03-27T15:30:00Z'
                  completed_at:
                    type: string
                    format: date_time
                    nullable: true
                    example: '2024-03-28T09:00:00Z'
                  admin_approved_by:
                    type: object
                    nullable: true
                    properties:
                      id:
                        type: integer
                        example: 1
                      username:
                        type: string
                        example: orpheus
                      display_name:
                        type: string
                        nullable: true
                        example: orpheus
                  created_at:
                    type: string
                    format: date_time
                    example: '2024-03-20T15:30:00Z'
                  updated_at:
                    type: string
                    format: date_time
                    example: '2024-03-20T15:30:00Z'
        '404':
          description: not found
