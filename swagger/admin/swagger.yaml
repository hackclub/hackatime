  "/api/admin/v1/heartbeats/by_user_agent_segment":
    get:
      summary: Get heartbeats matching a user_agent segment
      tags:
      - Admin Utils
      description: Returns heartbeats whose user_agent contains the given substring
        (e.g. "Godot_Super-Wakatime/2.0.0"). Useful for monitoring how a specific
        editor/plugin behaves over time. Use count_only=true to avoid streaming rows
        when only the total is needed.
      security:
      - AdminToken: []
      parameters:
      - name: segment
        in: query
        required: true
        description: Substring of user_agent to match (case-insensitive). Min length
          3.
        schema:
          type: string
      - name: user_id
        in: query
        required: false
        description: Optional user ID to scope the query to a single user.
        schema:
          type: string
      - name: start_date
        in: query
        required: false
        description: Start date (YYYY-MM-DD or epoch seconds)
        schema:
          type: string
      - name: end_date
        in: query
        required: false
        description: End date (YYYY-MM-DD or epoch seconds)
        schema:
          type: string
      - name: limit
        in: query
        required: false
        description: Page size (default 1000, max 5000)
        schema:
          type: integer
      - name: offset
        in: query
        required: false
        description: Pagination offset
        schema:
          type: integer
      - name: count_only
        in: query
        required: false
        description: If true, return only total_count and skip row payload
        schema:
          type: boolean
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                oneOf:
                - type: object
                  properties:
                    segment:
                      type: string
                      example: Godot_Super-Wakatime
                    limit:
                      type: integer
                      example: 10
                    offset:
                      type: integer
                      example: 0
                    heartbeats:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 987654
                          user_id:
                            type: integer
                            example: 42
                          time:
                            type: number
                            example: 1710946200.0
                          project:
                            type: string
                            nullable: true
                            example: demo
                          language:
                            type: string
                            nullable: true
                            example: GDScript
                          entity:
                            type: string
                            nullable: true
                            example: res://player.gd
                          branch:
                            type: string
                            nullable: true
                            example: main
                          category:
                            type: string
                            nullable: true
                            example: coding
                          editor:
                            type: string
                            nullable: true
                            example: Godot
                          machine:
                            type: string
                            nullable: true
                            example: Orpheus-MacBook-Pro
                          operating_system:
                            type: string
                            nullable: true
                            example: Mac
                          user_agent:
                            type: string
                            nullable: true
                            example: Godot/4.2 Godot_Super-Wakatime/2.0.0
                          ip_address:
                            type: string
                            nullable: true
                            example: 203.0.113.7
                          is_write:
                            type: boolean
                            nullable: true
                            example: true
                          lineno:
                            type: integer
                            nullable: true
                            example: 42
                          cursorpos:
                            type: integer
                            nullable: true
                            example: 12
                          lines:
                            type: integer
                            nullable: true
                            example: 350
                          source_type:
                            type: string
                            nullable: true
                            example: direct_entry
                    has_more:
                      type: boolean
                      example: false
                - type: object
                  description: Returned when count_only=true
                  additionalProperties: false
                  required:
                  - segment
                  - total_count
                  properties:
                    segment:
                      type: string
                      example: Godot_Super-Wakatime
                    total_count:
                      type: integer
                      example: 2
        '422':
          description: missing segment
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
