                          type: string
                          nullable: true
                          example: orpheus
                        slack_username:
                          type: string
                          nullable: true
                          example: orpheus
                        github_username:
                          type: string
                          nullable: true
                          example: orpheus
                        admin_level:
                          type: string
                          example: admin
                        email_addresses:
                          type: array
                          items:
                            type: string
                            example: orpheus@hackclub.com
                        created_at:
                          type: string
                          example: '2024-03-20T15:30:00Z'
                        updated_at:
                          type: string
                          example: '2024-03-20T15:30:00Z'
        '401':
          description: unauthorized
  "/api/admin/v1/permissions/{id}":
    patch:
      summary: Update Permission
      tags:
      - Admin Resources
      description: Update a user's admin level. Requires superadmin privileges.
      security:
      - AdminToken: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Admin level updated successfully
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 42
                      username:
                        type: string
                        example: orpheus
                      display_name:
                        type: string
                        nullable: true
                        example: orpheus
                      admin_level:
                        type: string
                        example: superadmin
                      previous_admin_level:
                        type: string
                        example: default
                      updated_at:
                        type: string
                        example: '2024-03-20T15:30:00Z'
        '404':
          description: not found handled
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid admin level
        '422':
          description: 'validation error handled — Returned when admin_level is not
            a valid admin level. Body is { error: "Invalid admin level" }.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid admin level
        '403':
          description: 'forbidden — Returned when the caller is not allowed to set
            the target to the requested level (e.g. attempting to change your own
            admin level). Body is { error: <denial message> }.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid admin level
        '401':
          description: unauthorized
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                admin_level:
                  type: string
                  enum:
                  - superadmin
                  - admin
                  - viewer
                  - default
                  - ultraadmin
                  example: admin
              required:
              - admin_level
  "/api/internal/revoke":
    post:
      summary: Revoke access
      tags:
      - Internal
      description: Internal endpoint to revoke access tokens. Use with caution. Requires
        HKA_REVOCATION_KEY environment variable authentication. This is used for Revoker
        to allow security researchers to revoke compromised tokens.
      security:
      - InternalToken: []
      parameters: []
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  status:
                    type: string
                    example: complete
                  token_type:
                    type: string
                    example: Desktop
                    description: The name of the revoked key (e.g. the regular API
                      key's name such as "Desktop" or the default "Hackatime key";
                      for admin keys, the admin key's name). This is the key name,
                      not a type descriptor.
                  owner_email:
                    type: string
                    nullable: true
                    example: orpheus@hackclub.com
                  key_name:
                    type: string
                    nullable: true
                    example: Revoker admin key
                    description: Present only when revoking an admin ("hka_") key;
                      the admin key's name.
        '422':
          description: unprocessable entity
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: Token is invalid or already revoked
                required:
                - success
                - error
        '302':
          description: redirect on failed authentication — When the provided token
            does not match HKA_REVOCATION_KEY (or is missing), the controller does
            not return 401; it issues a 302 redirect to an external URL.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                  example: 3f8e9c2a-7b14-4d6e-9a2f-1c8b5d3e7f01
                  description: The API key token to revoke (a regular UUID-format
                    key or an admin "hka_" key).
              required:
              - token
components:
  securitySchemes:
    AdminToken:
      type: http
      scheme: bearer
      description: Admin API Key, prefixed with "Bearer"
    InternalToken:
      type: http
      scheme: bearer
      description: Internal API Key from env, prefixed with "Bearer"
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          example: Unauthorized
      required:
      - error
    AdminApiKey:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: CI/CD Key
        last_used_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
    LeaderboardShadowbanUser:
      type: object
      properties:
        id:
          type: integer
          example: 42
        display_name:
          type: string
          nullable: true
          example: Orpheus
        avatar_url:
          type: string
          nullable: true
          example: https://...
        created_at:
          type: string
          format: date-time
        username:
          type: string
          nullable: true
          example: orpheus
        email:
          type: string
          nullable: true
          example: orpheus@example.com
        leaderboard_shadowbanned:
          type: boolean
          example: true
        leaderboard_shadowban_reason:
          type: string
          nullable: true
          example: fake leaderboard activity
        leaderboard_shadowban_expires_at:
          type: string
          format: date-time
          nullable: true
        shadowbanned_by:
          type: object
          nullable: true
          properties:
            id:
              type: integer
              example: 1
            display_name:
              type: string
              nullable: true
              example: Admin
            username:
              type: string
              nullable: true
              example: admin
            avatar_url:
              type: string
              nullable: true
              example: https://...
            admin_level:
              type: string
              nullable: true
              example: superadmin
        updated_at:
          type: string
          format: date-time
    DeletionRequest:
      type: object
      properties:
        id:
          type: integer
          example: 101
        user_id:
          type: integer
          example: 42
        status:
          type: string
          example: pending
          enum:
          - pending
          - approved
          - cancelled
          - completed
        created_at:
          type: string
          format: date-time
    TrustLevelAuditLog:
      type: object
      properties:
        id:
          type: integer
          example: 505
        user_id:
          type: integer
          example: 42
        actor_id:
          type: integer
          example: 1
        action:
          type: string
          example: upgraded_to_verified
        created_at:
          type: string
          format: date-time
    Permission:
      type: object
      properties:
        id:
          type: integer
          example: 1
        role:
          type: string
          example: admin
        resource_type:
          type: string
          example: User
        resource_id:
          type: integer
          nullable: true
servers:
- url: https://{defaultHost}
  description: Production API
  variables:
    defaultHost:
      default: hackatime.hackclub.com
- url: http://{localHost}
  description: Local Development API
  variables:
    localHost:
      default: localhost:3000
