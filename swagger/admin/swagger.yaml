---
openapi: 3.0.1
info:
  title: Hackatime Admin API
  version: v1
  description: |
    Admin and internal endpoints for Hackatime.

    These require an Admin API Key (or internal env token) and are not part of the public API.
paths:
  "/api/admin/v1/users/{id}/visualization/quantized":
    get:
      summary: Get quantized coding visualization for a user
      tags:
      - Admin
      description: Returns a per-day, quantized set of heartbeat points (for the given
        month) plus per-day total coding seconds. Used to render a compact activity
        visualization.
      security:
      - AdminToken: []
      parameters:
      - name: id
        in: path
        required: true
        description: User ID
        schema:
          type: string
      - name: year
        in: query
        required: true
        description: Year (e.g. 2024)
        schema:
          type: integer
      - name: month
        in: query
        required: true
        description: Month (1-12)
        schema:
          type: integer
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  days:
                    type: array
                    items:
                      type: object
                      properties:
                        date_timestamp_s:
                          type: integer
                          example: 1704067200
                          description: Start-of-day epoch (seconds, UTC)
                        total_seconds:
                          type: number
                          example: 7200.0
                          description: Total coding seconds for the day
                        points:
                          type: array
                          items:
                            type: object
                            properties:
                              time:
                                type: number
                                example: 1704110400.0
                              lineno:
                                type: integer
                                nullable: true
                                example: 42
                              cursorpos:
                                type: integer
                                nullable: true
                                example: 12
        '422':
          description: invalid parameters — Returned ("invalid parameters") when year
            or month is missing or month is outside 1-12.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '404':
          description: user not found
  "/api/admin/v1/alts/candidates":
    get:
      summary: List potential alt-account candidates
      tags:
      - Admin
      description: Returns pairs of users that have shared the same machine + IP address
        within the lookback window. Capped at 5000 candidate pairs.
      security:
      - AdminToken: []
      parameters:
      - name: lookback_days
        in: query
        required: false
        description: 'Number of days to look back (default: 30, clamped to 1-365)'
        schema:
          type: integer
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  candidates:
                    type: array
                    items:
                      type: object
                      properties:
                        user_a_id:
                          type: integer
                          example: 42
                        user_b_id:
                          type: integer
                          example: 43
                        machine:
                          type: string
                          example: Orpheus-MacBook-Pro
                        ip_address:
                          type: string
                          example: 203.0.113.7
                        user_a_first_seen_on_combo:
                          type: number
                          example: 1710340200.0
                        user_a_last_seen_on_combo:
                          type: number
                          example: 1710946200.0
                        user_b_first_seen_on_combo:
                          type: number
                          example: 1710512400.0
                        user_b_last_seen_on_combo:
                          type: number
                          example: 1710859800.0
        '401':
          description: unauthorized
  "/api/admin/v1/alts/shared_machines":
    get:
      summary: List machines used by multiple users (alts alias)
      tags:
      - Admin
      description: Alias path for the shared-machines report. Routes to the same action
        as GET /api/admin/v1/heartbeats/shared_machines and returns identical data.
      security:
      - AdminToken: []
      parameters:
      - name: lookback_days
        in: query
        required: false
        description: 'Number of days to look back (default: 30, max: 365)'
        schema:
          type: integer
      - name: limit
        in: query
        required: false
        description: 'Max results (default: 1000, max: 10000)'
        schema:
          type: integer
      responses:
        '200':
          description: returns machines shared by multiple users
          content:
            application/json:
              schema:
                type: object
                properties:
                  machines:
                    type: array
                    items:
                      type: object
                      properties:
                        machine:
                          type: string
                          example: Orpheus-MacBook-Pro
                        machine_frequency:
                          type: integer
                          example: 2
                        user_ids:
                          type: string
                          example: "{42,43}"
                          description: Postgres array literal of user IDs, e.g. "{12,34}"
        '401':
          description: unauthorized
  "/api/admin/v1/users/active":
    get:
      summary: List recently active user IDs
      tags:
      - Admin
      description: Returns IDs of users with heartbeats since the given timestamp.
        The since value is floored to at most 90 days ago, and results are capped
        at 50,000 IDs.
      security:
      - AdminToken: []
      parameters:
      - name: since
        in: query
        required: false
        description: Unix timestamp (seconds). Values older than 90 days ago are floored
          to 90 days ago. Negative values return 422.
        schema:
          type: integer
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_ids:
                    type: array
                    items:
                      type: integer
                      example: 42
        '422':
          description: invalid since parameter — Returned ("invalid since parameter")
            when since is negative.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/admin/v1/audit_logs/counts":
    post:
      summary: Count trust-level audit logs for users
      tags:
      - Admin
      description: Returns the number of trust-level audit log entries for each requested
        user ID. Users with no audit logs are included with a count of 0. Up to 1000
        user IDs are honored.
      security:
      - AdminToken: []
      parameters: []
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  counts:
                    type: object
                    additionalProperties:
                      type: integer
                      example: 3
                    example:
                      '42': 3
                      '43': 0
                    description: Map of user ID (as string) to audit log count.
        '422':
          description: invalid user_ids — Returned ("user_ids array required") when
            user_ids is blank or not an array, or ("no valid user_ids provided") when
            the array is empty.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - user_ids
              properties:
                user_ids:
                  type: array
                  items:
                    type: integer
                    example: 42
                  description: Array of user IDs (up to 1000). Required; a blank or
                    non-array value returns 422.
  "/api/admin/v1/admin_api_keys":
    get:
      summary: List Admin API Keys
      tags:
      - Admin Resources
      description: List all admin API keys.
      security:
      - AdminToken: []
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  admin_api_keys:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 12
                        name:
                          type: string
                          example: Revoker admin key
                        token_preview:
                          type: string
                          example: hka_3f8e...7f01
                        user:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 1
                            username:
                              type: string
                              example: orpheus
                            display_name:
                              type: string
                              example: orpheus
                            admin_level:
                              type: string
                              example: superadmin
                        created_at:
                          type: string
                          format: date_time
                          example: '2024-03-20T15:30:00Z'
                        revoked_at:
                          type: string
                          format: date_time
                          nullable: true
                          example: '2024-04-01T12:00:00Z'
                        active:
                          type: boolean
                          example: true
        '401':
          description: unauthorized
    post:
      summary: Create Admin API Key
      tags:
      - Admin Resources
      description: Create a new admin API key.
      security:
      - AdminToken: []
      parameters: []
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Admin API key created successfully
                  admin_api_key:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 12
                      name:
                        type: string
                        example: Revoker admin key
                      token:
                        type: string
                        example: hka_3f8e9c2a7b144d6e9a2f1c8b5d3e7f013f8e9c2a7b144d6e9a2f1c8b5d3e7f01
                      created_at:
                        type: string
                        format: date_time
                        example: '2024-03-20T15:30:00Z'
        '422':
          description: validation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Validation failed
                  errors:
                    type: array
                    items:
                      type: string
                      example: Name can't be blank
        '401':
          description: unauthorized
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Revoker admin key
  "/api/admin/v1/admin_api_keys/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
    get:
      summary: Show Admin API Key
      tags:
      - Admin Resources
      description: Show details of an admin API key.
      security:
      - AdminToken: []
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 12
                  name:
                    type: string
                    example: Revoker admin key
                  token_preview:
                    type: string
                    example: hka_3f8e...7f01
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      username:
                        type: string
                        example: orpheus
                      display_name:
                        type: string
                        example: orpheus
                      admin_level:
                        type: string
                        example: superadmin
                  created_at:
                    type: string
                    format: date_time
                    example: '2024-03-20T15:30:00Z'
                  revoked_at:
                    type: string
                    format: date_time
                    nullable: true
                    example: '2024-04-01T12:00:00Z'
                  active:
                    type: boolean
                    example: true
        '404':
          description: not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Not found
        '401':
          description: unauthorized
    delete:
      summary: Revoke Admin API Key
      tags:
      - Admin Resources
      description: Revoke/Delete an admin API key. Only the owner of the key may revoke
        it.
      security:
      - AdminToken: []
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Admin API key revoked successfully
        '403':
          description: forbidden (not your key)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Not found
        '401':
          description: unauthorized
  "/api/admin/v1/trust_level_audit_logs":
    get:
      summary: List Trust Level Audit Logs
      tags:
      - Admin Resources
      description: List audit logs for trust level changes.
      security:
      - AdminToken: []
      parameters:
      - name: user_id
        in: query
        description: Filter by User ID
        required: false
        schema:
          type: string
      - name: admin_id
        in: query
        description: Filter by Admin ID
        required: false
        schema:
          type: string
      - name: user_search
        in: query
        description: Search user (fuzzy)
        required: false
        schema:
          type: string
      - name: admin_search
        in: query
        description: Search admin (fuzzy)
        required: false
        schema:
          type: string
      - name: trust_level_filter
        in: query
        schema:
          type: string
          enum:
          - to_convicted
          - to_trusted
          - to_suspected
          - to_unscored
        description: Filter by trust level change. Any unrecognized value (or omitting
          the parameter) returns all logs unfiltered.
        required: false
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  audit_logs:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 5012
                        user:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 42
                            username:
                              type: string
                              example: orpheus
                            display_name:
                              type: string
                              example: orpheus
                        previous_trust_level:
                          type: string
                          nullable: true
                          example: blue
                        new_trust_level:
                          type: string
                          nullable: true
                          example: red
                        changed_by:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 1
                            username:
                              type: string
                              example: orpheus
                            display_name:
                              type: string
                              example: orpheus
                            admin_level:
                              type: string
                              example: superadmin
                        reason:
                          type: string
                          nullable: true
                          example: self-reported heartbeats
                        notes:
                          type: string
                          nullable: true
                          example: Reviewed flagged activity
                        created_at:
                          type: string
                          example: '2024-03-20T15:30:00Z'
                  total_count:
                    type: integer
                    example: 137
        '404':
          description: user not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Not found
        '401':
          description: unauthorized
  "/api/admin/v1/trust_level_audit_logs/{id}":
    get:
      summary: Show Trust Level Audit Log
      tags:
      - Admin Resources
      description: Show details of a trust level audit log.
      security:
      - AdminToken: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 5012
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 42
                      username:
                        type: string
                        example: orpheus
                      display_name:
                        type: string
                        example: orpheus
                      current_trust_level:
                        type: string
                        example: green
                  previous_trust_level:
                    type: string
                    nullable: true
                    example: blue
                  new_trust_level:
                    type: string
                    nullable: true
                    example: green
                  changed_by:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      username:
                        type: string
                        example: orpheus
                      display_name:
                        type: string
                        example: orpheus
                      admin_level:
                        type: string
                        example: superadmin
                  reason:
                    type: string
                    nullable: true
                    example: Manual verification
                  notes:
                    type: string
                    nullable: true
                    example: Looks good
                  created_at:
                    type: string
                    format: date_time
                    example: '2024-03-20T15:30:00Z'
                  updated_at:
                    type: string
                    format: date_time
                    example: '2024-03-20T15:30:00Z'
        '404':
          description: not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Not found
        '401':
          description: unauthorized
  "/api/admin/v1/deletion_requests":
    get:
      summary: List Deletion Requests
      tags:
      - Admin Resources
      description: List pending, approved, and recently completed deletion requests.
        Requires superadmin privileges.
      security:
      - AdminToken: []
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  pending:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 7
                        user_id:
                          type: integer
                          example: 42
                        user:
                          type: object
                          nullable: true
                          properties:
                            id:
                              type: integer
                              example: 42
                            username:
                              type: string
                              example: orpheus
                            display_name:
                              type: string
                              nullable: true
                              example: orpheus
                        status:
                          type: string
                          enum:
                          - pending
                          - approved
                          - cancelled
                          - completed
                          example: pending
                        requested_at:
                          type: string
                          format: date_time
                          nullable: true
                          example: '2024-03-20T15:30:00Z'
                        scheduled_deletion_at:
                          type: string
                          format: date_time
                          nullable: true
                          example: '2024-03-27T15:30:00Z'
                        completed_at:
                          type: string
                          format: date_time
                          nullable: true
                          example: '2024-03-28T09:00:00Z'
                        admin_approved_by:
                          type: object
                          nullable: true
                          properties:
                            id:
                              type: integer
                              example: 1
                            username:
                              type: string
                              example: orpheus
                            display_name:
                              type: string
                              nullable: true
                              example: orpheus
                        created_at:
                          type: string
                          format: date_time
                          example: '2024-03-20T15:30:00Z'
                        updated_at:
                          type: string
                          format: date_time
                          example: '2024-03-20T15:30:00Z'
                  approved:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 7
                        user_id:
                          type: integer
                          example: 42
                        user:
                          type: object
                          nullable: true
                          properties:
                            id:
                              type: integer
                              example: 42
                            username:
                              type: string
                              example: orpheus
                            display_name:
                              type: string
                              nullable: true
                              example: orpheus
                        status:
                          type: string
                          enum:
                          - pending
                          - approved
                          - cancelled
                          - completed
                          example: pending
                        requested_at:
                          type: string
                          format: date_time
                          nullable: true
                          example: '2024-03-20T15:30:00Z'
                        scheduled_deletion_at:
                          type: string
                          format: date_time
                          nullable: true
                          example: '2024-03-27T15:30:00Z'
                        completed_at:
                          type: string
                          format: date_time
                          nullable: true
                          example: '2024-03-28T09:00:00Z'
                        admin_approved_by:
                          type: object
                          nullable: true
                          properties:
                            id:
                              type: integer
                              example: 1
                            username:
                              type: string
                              example: orpheus
                            display_name:
                              type: string
                              nullable: true
                              example: orpheus
                        created_at:
                          type: string
                          format: date_time
                          example: '2024-03-20T15:30:00Z'
                        updated_at:
                          type: string
                          format: date_time
                          example: '2024-03-20T15:30:00Z'
                  completed:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 7
                        user_id:
                          type: integer
                          example: 42
                        user:
                          type: object
                          nullable: true
                          properties:
                            id:
                              type: integer
                              example: 42
                            username:
                              type: string
                              example: orpheus
                            display_name:
                              type: string
                              nullable: true
                              example: orpheus
                        status:
                          type: string
                          enum:
                          - pending
                          - approved
                          - cancelled
                          - completed
                          example: pending
                        requested_at:
                          type: string
                          format: date_time
                          nullable: true
                          example: '2024-03-20T15:30:00Z'
                        scheduled_deletion_at:
                          type: string
