  "/api/admin/v1/user/stats":
    get:
      summary: Get admin user stats
      tags:
      - Admin Utils
      description: 'Get detailed stats for a user (Admin view). When start_date/end_date
        are provided, heartbeats are filtered to that range; otherwise the single
        date param (default: current date) is used.'
      security:
      - AdminToken: []
      parameters:
      - name: user_id
        in: query
        description: User ID. Either user_id or id may be supplied.
        schema:
          type: string
      - name: id
        in: query
        required: false
        description: Alias for user_id. If both id and user_id are supplied, id takes
          precedence.
        schema:
          type: string
      - name: start_date
        in: query
        required: false
        description: Start date (YYYY-MM-DD or epoch seconds). When present (with
          or without end_date), defines the time range and overrides the date param.
          Defaults to 10 years ago.
        schema:
          type: string
      - name: end_date
        in: query
        required: false
        description: End date (YYYY-MM-DD or epoch seconds). Defaults to end of the
          current day.
        schema:
          type: string
      - name: date
        in: query
        schema:
          type: string
          format: date
        required: false
        description: Single day (YYYY-MM-DD) to scope stats to. Only used when neither
          start_date nor end_date is supplied. Defaults to the current date.
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: integer
                    example: 42
                  username:
                    type: string
                    example: orpheus
                  start_date:
                    type: string
                    format: date
                    example: '2024-03-20'
                  end_date:
                    type: string
                    format: date
