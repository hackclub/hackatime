            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Not found
        '401':
          description: unauthorized
  "/api/admin/v1/deletion_requests/{id}/approve":
    post:
      summary: Approve Deletion Request
      tags:
      - Admin Resources
      description: Approve and execute a user deletion request. Requires superadmin
        privileges.
      security:
      - AdminToken: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
