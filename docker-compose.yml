services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
      - "3036:3036"
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
      - node_modules:/app/node_modules
    environment:
      - RAILS_ENV=development
      - DATABASE_URL=postgres://postgres:secureorpheus123@db:5432/app_development
      - POSTGRES_HOST=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secureorpheus123
      - TEST_DATABASE_URL=postgres://postgres:secureorpheus123@db:5432/app_test
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_DATABASE=hackatime_development
      - CLICKHOUSE_USERNAME=default
      - CLICKHOUSE_PASSWORD=
    depends_on:
      db:
        condition: service_started
      clickhouse:
        condition: service_healthy
    command: ["sleep", "infinity"]

  db:
    image: postgres:16
    volumes:
      - harbor_postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=secureorpheus123
      - POSTGRES_USER=postgres
      - POSTGRES_DB=app_development
    ports:
      - "5432:5432"

  clickhouse:
    image: clickhouse/clickhouse-server:24
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      - CLICKHOUSE_DB=hackatime_development
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  harbor_postgres_data:
  clickhouse_data:
  bundle_cache:
  node_modules:
